server:
  port: ${AUTH_SERVICE_PORT:8180}

spring:
  application:
    name: stackover-auth-service
  config:
    import: "optional:configserver:http://config-service:8080"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  r2dbc:
    url: r2dbc:postgresql://postgres-auth:5432/${AUTH_DB_NAME:auth_db}
    username: ${AUTH_DB_USER:auth_user}
    password: ${AUTH_DB_PASSWORD:auth_pass}
    pool:
      initial-size: 5
      max-size: 10
      max-idle-time: 30m
  data:
    r2dbc:
      repositories:
        enabled: true
  liquibase:
    enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:stackover-auth-service}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    access-expiration-ms: 86400000
    refresh-expiration-ms: 2592000000
    secret: ${JWT_SECRET:KX9pPmTqYtXuWrZv3w6z5C8F1J4H7N2B5E9R0DcGbQa}

resilience4j:
  circuitbreaker:
    instances:
      profileService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

feign:
  circuitbreaker:
    enabled: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.data.r2dbc: DEBUG
    io.r2dbc.postgresql: TRACE
    org.springframework.security: DEBUG