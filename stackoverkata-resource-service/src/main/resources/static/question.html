<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div class="d-flex align-items-center">
            <h1 class="h4 mb-0">StackOverflow</h1>
            <form class="ms-3">
                <input type="text" class="form-control" placeholder="Search...">
            </form>
        </div>
        <button class="btn btn-primary">Ask Question</button>
    </header>

    <!-- Main Content with Sidebar -->
    <div class="row mt-3">
        <!-- Sidebar -->
        <div class="col-md-3">
            <nav class="nav flex-column">
                <a class="nav-link active" href="#">Главная</a>
                <a class="nav-link" href="#">Публичный</a>
                <a class="nav-link" href="#">Вопросы</a>
                <a class="nav-link" href="#">Метки</a>
                <a class="nav-link" href="#">Пользователи</a>
                <a class="nav-link" href="#">Источники</a>
            </nav>
        </div>
        <!-- Main Content Area -->
        <div class="col-md-9">
            <h2>Questions</h2>
            <!-- Placeholder for question content -->
            <p>This is where the questions would be displayed.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-3 border-top text-center">
        <p>&copy; 2025 StackOverflow</p>
    </footer>
</div>

<!-- JavaScript Files -->
<script type="text/javascript" src="/js/sidebar.js"></script>
<script type="text/javascript" src="/js/header.js"></script>
<script type="text/javascript" src="/js/footer.js"></script>
</body>
</html>
