server:
  port: ${RESOURCE_SERVICE_PORT:8181}

spring:
  application:
    name: stackover-resource-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "optional:configserver:http://config-service:8080"
  r2dbc:
    url: r2dbc:postgresql://postgres-resource:5432/${RESOURCE_DB_NAME:resource_db}
    username: ${RESOURCE_DB_USER:resource_user}
    password: ${RESOURCE_DB_PASSWORD:resource_pass}
    pool:
      initial-size: 5
      max-size: 10
      max-idle-time: 30m
    properties:
      dialect: postgresql
  data:
    r2dbc:
      repositories:
        enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: resource-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  webflux:
    base-path: /api

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:stackover-resource-service}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

app:
  services:
    auth:
      url: http://stackover-auth-service
    profile:
      url: http://stackover-profile-service
  jwt:
    access-expiration-ms: 86400000
    refresh-expiration-ms: 2592000000
    secret: ${JWT_SECRET:KX9pPmTqYtXuWrZv3w6z5C8F1J4H7N2B5E9R0DcGbQa}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.data.r2dbc: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG