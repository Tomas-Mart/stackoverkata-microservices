server:
  port: ${RESOURCE_SERVICE_PORT:8181}

spring:
  application:
    name: stackover-resource-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  r2dbc:
    url: r2dbc:postgresql://${RESOURCE_DB_HOST:localhost}:5432/${RESOURCE_DB_NAME:resource_db}
    username: ${RESOURCE_DB_USER:postgres}
    password: ${RESOURCE_DB_PASSWORD:root}
    pool:
      initial-size: 5
      max-size: 10
      max-idle-time: 30m
  data:
    r2dbc:
      repositories:
        enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: resource-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  webflux:
    base-path: /api

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}  # Убрана лишняя }
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:

app:
  jwt:
    access-expiration-ms: 86400000
    refresh-expiration-ms: 2592000000
    secret: ${JWT_SECRET:KX9pPmTqYtXuWrZv3w6z5C8F1J4H7N2B5E9R0DcGbQa}
  services:
    auth:
      url: ${AUTH_SERVICE_URL:http://localhost:8181}
    profile:
      url: ${PROFILE_SERVICE_URL:http://localhost:8182}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.data.r2dbc: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG