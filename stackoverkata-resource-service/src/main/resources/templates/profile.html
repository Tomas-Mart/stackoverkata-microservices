<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f6f6f6;
        }
        .so-header {
            background: #fff;
            border-bottom: 1px solid #e4e6e8;
            padding: 0.5rem 0;
        }
        .so-logo {
            height: 30px;
        }
        .so-search {
            max-width: 400px;
        }
        .so-sidebar {
            background: #fff;
            border-right: 1px solid #e4e6e8;
            min-height: 100vh;
        }
        .so-sidebar .nav-link {
            color: #232629;
            font-size: 15px;
            padding: 0.75rem 1.5rem;
        }
        .so-sidebar .nav-link.active, .so-sidebar .nav-link:hover {
            background: #f1f2f3;
            color: #f48024;
        }
        .so-content {
            padding: 2rem 2rem 2rem 0;
        }
        .profile-summary {
            background: #fff;
            border: 1px solid #e4e6e8;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 128px;
            height: 128px;
            border-radius: 8px;
        }
        .profile-name {
            font-size: 2rem;
            font-weight: 600;
        }
        .profile-meta {
            color: #6a737c;
            font-size: 1rem;
        }
        .profile-actions .btn {
            margin-right: 0.5rem;
        }
        .card-section {
            background: #fff;
            border: 1px solid #e4e6e8;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
        }
        .card-section h5 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .summary-cards {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .summary-card {
            flex: 1;
            background: #f8f9f9;
            border: 1px solid #e4e6e8;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .summary-card .bi {
            font-size: 2rem;
            color: #bbc0c4;
            margin-bottom: 0.5rem;
        }
        .summary-card .btn {
            margin-top: 0.5rem;
        }
        .section-row {
            display: flex;
            gap: 1rem;
        }
        .section-col {
            flex: 1;
        }
        .empty-text {
            color: #6a737c;
            font-size: 1rem;
            padding: 1rem 0;
        }
        .nav-pills .nav-link.active {
            background: #f48024;
            color: #fff;
        }
        @media (max-width: 991px) {
            .so-sidebar { min-height: auto; }
            .so-content { padding: 1rem; }
            .summary-cards, .section-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="so-header d-flex align-items-center px-4">

        <form class="flex-grow-1 me-4">
            <input class="form-control so-search" type="search" placeholder="Поиск...">
        </form>
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-bell" style="font-size: 1.3rem;"></i>
            <i class="bi bi-question-circle" style="font-size: 1.3rem;"></i>
            <img src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=identicon&f=y" class="rounded-circle" style="width:32px;height:32px;">
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-lg-2 so-sidebar d-none d-lg-block pt-4">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-house-door me-2"></i>Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-question-circle me-2"></i>Вопросы</a></li>

                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-people me-2"></i>Пользователи</a></li>

                </ul>
                <hr>

            </nav>
            <!-- Main Content -->
            <main class="col-lg-10 so-content">
                <div class="profile-summary d-flex align-items-center mb-4">
                    <img src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=identicon&f=y" class="profile-avatar me-4" alt="avatar">
                    <div>
                        <div class="profile-name">user</div>
                        <div class="profile-meta mb-2">Участник</div>
                        <div class="profile-actions">
                            <button class="btn btn-outline-secondary btn-sm">Редактировать профиль</button>

                        </div>
                    </div>
                </div>
                <ul class="nav nav-pills mb-3">
                    <li class="nav-item"><a class="nav-link active" href="#">Профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Активность</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Сохранённое</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Настройки</a></li>
                </ul>
                <div class="card-section">
                    <h5>Сводка</h5>
                    <div class="summary-cards">

                    </div>
                    <div class="section-row">
                        <div class="section-col">
                            <h5>Ответы</h5>
                            <div class="empty-text">Вы ещё не ответили ни на один вопрос</div>
                        </div>
                        <div class="section-col">
                            <h5>Вопросы</h5>
                            <div class="empty-text">Вы ещё не задали ни одного вопроса</div>
                        </div>
                    </div>

                    <div class="section-row">

                        </div>

                </div>
            </main>
        </div>
    </div>
    <script src="/js/layout.js"></script>
</body>
</html>
