<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Обязательные метатеги -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Регистрация</title>
</head>
<body class="bg-light">
<!-- Основной контент -->
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8 col-lg-6">
            <!-- Карточка с формой -->
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Регистрация</h2>

                    <!-- Форма регистрации -->
                    <form method="POST" action="#">
                        <!-- Поле имени -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <!-- Поле email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <!-- Поле пароля -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <!-- Подтверждение пароля -->
                        <div class="mb-4">
                            <label for="confirm-password" class="form-label">Подтвердите пароль</label>
                            <input type="password" class="form-control" id="confirm-password" name="confirm-password" required>
                        </div>

                        <!-- Чекбокс согласия -->
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms">
                            <label class="form-check-label" for="terms">
                                Я согласен с условиями использования
                            </label>
                        </div>

                        <!-- Кнопка отправки -->
                        <button type="submit" class="btn btn-primary w-100 py-2">Зарегистрироваться</button>
                    </form>

                    <!-- Ссылка на вход -->
                    <div class="text-center mt-4">
                        Уже есть аккаунт? <a href="#" class="text-decoration-none">Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Подключение скриптов -->
<!-- Bootstrap JS с зависимостями -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<!-- Кастомные скрипты .js согласно разработки-->

<<script th:src="@{/js/js.js}"></script>
</body>
</html>
