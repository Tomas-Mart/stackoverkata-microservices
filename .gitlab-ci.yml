# ========== ДЕПЛОЙ ВСЕХ СЕРВИСОВ (ТОЛЬКО В MAIN/MASTER) ==========

deploy-all:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - apk add --no-cache docker-compose
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker-compose pull
    - docker-compose up -d --remove-orphans
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: manual
      allow_failure: false
  environment:
    name: production
    url: https://stackoverkata.example.com
  needs:
    - job: package-eureka-server
      optional: false
    - job: package-auth-service
      optional: false
    - job: package-profile-service
      optional: false
    - job: package-resource-service
      optional: false
    - job: package-config-service
      optional: false
    - job: package-email-service
      optional: false
    - job: package-gateway
      optional: false
    - job: package-web-client
      optional: true