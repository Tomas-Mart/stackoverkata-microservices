# ========== WEB CLIENT ==========
build-web-client:
  stage: build
  image: node:18
  <<: *check-changes
  variables:
    SERVICE_PATH: stackover-web-client
  script:
    - cd $SERVICE_PATH
    - npm ci
  artifacts:
    paths:
      - $SERVICE_PATH/node_modules/
      - $SERVICE_PATH/dist/
    expire_in: 1 hour

test-web-client:
  stage: test
  image: node:18
  <<: *check-changes
  variables:
    SERVICE_PATH: stackover-web-client
  script:
    - cd $SERVICE_PATH
    - npm run test
  needs: [ "build-web-client" ]

package-web-client:
  stage: package
  image: docker:27
  services:
    - docker:27-dind
  <<: *check-changes
  variables:
    SERVICE_PATH: stackover-web-client
    SERVICE_NAME: web-client
  script:
    - cd $SERVICE_PATH
    - docker build -t $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:latest
    - docker push $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:latest
  needs: [ "test-web-client" ]

# ========== ДЕПЛОЙ ВСЕХ СЕРВИСОВ (ТОЛЬКО В MAIN/MASTER) ==========
deploy-all:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  script:
    - apk add --no-cache docker-compose
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker-compose pull
    - docker-compose up -d --remove-orphans
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: manual
      allow_failure: false
  environment:
    name: production
    url: https://stackoverkata.example.com
  needs:
    - package-eureka-server
    - package-auth-service
    - package-profile-service
    - package-resource-service
    - package-config-service
    - package-email-service
    - package-gateway
    - package-web-client