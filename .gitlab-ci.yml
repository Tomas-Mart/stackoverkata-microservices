stages:
  - build
  - test
  - package
  - deploy

variables:
  # Общие переменные
  DOCKER_REGISTRY: ${CI_REGISTRY}
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

  # Переменные для тестов
  TEST_DB_NAME: "test-db"
  TEST_DB_USER: "test-user"
  TEST_DB_PASSWORD: "test-password"
  TEST_R2DBC_URL: "r2dbc:postgresql://postgres:5432/test-db"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
  policy: pull-push

# ========== ШАБЛОНЫ ДЛЯ ПЕРЕИСПОЛЬЗОВАНИЯ ==========

.common-template:
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache maven openjdk17 curl postgresql-client

.java-build:
  stage: build
  script:
    - cd $SERVICE_PATH
    - mvn compile
  artifacts:
    paths:
      - $SERVICE_PATH/target/
    expire_in: 1 hour

.java-test:
  stage: test
  services:
    - name: postgres:14
      alias: postgres
      variables:
        POSTGRES_DB: ${TEST_DB_NAME}
        POSTGRES_USER: ${TEST_DB_USER}
        POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
    - name: docker:dind
      alias: docker
  script:
    - cd $SERVICE_PATH
    - timeout 60s sh -c "until pg_isready -h postgres -U ${TEST_DB_USER} -d ${TEST_DB_NAME}; do sleep 2; done"
    - mvn clean test -B
      -Dspring.profiles.active=test
      -Dspring.datasource.url=jdbc:postgresql://postgres:5432/${TEST_DB_NAME}
      -Dspring.datasource.username=${TEST_DB_USER}
      -Dspring.datasource.password=${TEST_DB_PASSWORD}
      -Dspring.r2dbc.url=${TEST_R2DBC_URL}
      -Dspring.r2dbc.username=${TEST_DB_USER}
      -Dspring.r2dbc.password=${TEST_DB_PASSWORD}
      -Dspring.jpa.hibernate.ddl-auto=create-drop
      -Dspring.liquibase.enabled=false
      -Dspring.cloud.config.enabled=false
  artifacts:
    when: always
    reports:
      junit:
        - $SERVICE_PATH/target/surefire-reports/TEST-*.xml
    paths:
      - $SERVICE_PATH/target/surefire-reports/

.docker-package:
  stage: package
  script:
    - cd $SERVICE_PATH
    - docker build -t $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:latest
    - docker push $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_REGISTRY/$CI_PROJECT_PATH/$SERVICE_NAME:latest
  needs:
    - job: test-$SERVICE_NAME
      optional: false

# ========== ПРАВИЛА ЗАПУСКА ==========

.check-changes:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - $SERVICE_PATH/**/*
    - if: '$CI_COMMIT_BRANCH'  # ЗАПУСКАТЬ ДЛЯ ЛЮБОЙ ВЕТКИ
      changes:
        - $SERVICE_PATH/**/*
    - if: '$CI_COMMIT_TAG'
      changes:
        - $SERVICE_PATH/**/*

