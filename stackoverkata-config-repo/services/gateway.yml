server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://stackover-auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
        - id: profile-service
          uri: lb://stackover-profile-service
          predicates:
            - Path=/api/profiles/**
        - id: resource-service
          uri: lb://stackover-resource-service
          predicates:
            - Path=/api/resources/**
        - id: email-service
          uri: lb://stackover-email-service
          predicates:
            - Path=/api/email/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always