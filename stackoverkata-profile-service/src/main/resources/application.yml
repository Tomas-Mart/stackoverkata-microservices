server:
  port: ${PROFILE_SERVICE_PORT:8182}

spring:
  application:
    name: stackover-profile-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "optional:configserver:http://config-service:8080"
  r2dbc:
    url: r2dbc:postgresql://postgres-profile:5432/${PROFILE_DB_NAME:profile_db}
    username: ${PROFILE_DB_USER:profile_user}
    password: ${PROFILE_DB_PASSWORD:profile_pass}
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
  data:
    r2dbc:
      repositories:
        enabled: true
  liquibase:
    enabled: false

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:stackover-profile-service}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    access-expiration-ms: 86400000
    refresh-expiration-ms: 2592000000
    secret: ${JWT_SECRET:KX9pPmTqYtXuWrZv3w6z5C8F1J4H7N2B5E9R0DcGbQa}

resilience4j:
  circuitbreaker:
    instances:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5000
        failure-rate-threshold: 50

feign:
  circuitbreaker:
    enabled: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.data.r2dbc: DEBUG
    org.springframework.web.reactive: DEBUG