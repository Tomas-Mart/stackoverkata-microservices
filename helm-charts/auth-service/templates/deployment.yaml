apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackover-auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: your-registry/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: stackover-auth-service-config
            - secretRef:
                name: stackover-auth-service-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8180
            initialDelaySeconds: 15
            periodSeconds: 5