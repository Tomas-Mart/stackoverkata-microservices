apiVersion: v1
kind: ConfigMap
metadata:
  name: stackoverkata-eureka-server-config
  namespace: default
data:
  application.yml: |
    server:
      port: 8761
    
    spring:
      application:
        name: eureka-server
    
    eureka:
      server:
        enable-self-preservation: false  # Оставьте false для тестовой среды
        eviction-interval-timer-in-ms: 3000  # Уменьшено для быстрой реакции
        response-cache-update-interval-ms: 10000
        peer-eureka-nodes-update-interval-ms: 5000
      
      instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME}
        prefer-ip-address: false
        lease-renewal-interval-in-seconds: 3  # Уменьшено
        lease-expiration-duration-in-seconds: 10  # Уменьшено
      
      client:
        register-with-eureka: true
        fetch-registry: true
        healthcheck:
          enabled: true
        service-url:
          defaultZone: http://stackoverkata-eureka-server-0.stackoverkata-eureka-server-internal:8761/eureka,http://stackoverkata-eureka-server-1.stackoverkata-eureka-server-internal:8761/eureka,http://stackoverkata-eureka-server-2.stackoverkata-eureka-server-internal:8761/eureka
        eureka-service-url-poll-interval-seconds: 5
        registry-fetch-interval-seconds: 5