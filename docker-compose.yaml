version: '3.8'

services:
  # ========== EUREKA SERVER ==========
  eureka-server:
    container_name: stackover-eureka-server
    build:
      context: ./stackoverkata-eureka-server
      dockerfile: Dockerfile
    image: stackoverkata-eureka-server:latest
    hostname: stackover-eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_HOSTNAME=eureka-server
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false
      - EUREKA_SERVER_EVICTION_INTERVAL_TIMER_IN_MS=5000
    networks:
      - stackover-network

  # ========== CONFIG SERVICE ==========
  config-service:
    container_name: stackover-config-service
    build:
      context: ./stackoverkata-cloud-config-service
      dockerfile: Dockerfile
    image: stackoverkata-config-service:latest
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== AUTH SERVICE ==========
  postgres-auth:
    container_name: postgres-auth
    image: dockerhub.timeweb.cloud/library/postgres:17-alpine # <--- ИЗМЕНЕНО
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-stackover_auth_service}
      POSTGRES_USER: ${AUTH_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-root}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - stackover-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    container_name: stackover-auth-service
    build:
      context: ./stackoverkata-auth-service
      dockerfile: Dockerfile
    image: auth-server:latest
    ports:
      - "8180:8180"
    environment:
      SPRING_PROFILES_ACTIVE: ${ACTIVE_PROFILE:-docker}
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: ${AUTH_DB_NAME:-stackover_auth_service}
      DB_USER: ${AUTH_DB_USER:-postgres}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-root}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8180/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== PROFILE SERVICE ==========
  postgres-profile:
    container_name: postgres-profile
    image: dockerhub.timeweb.cloud/library/postgres:17-alpine # <--- ИЗМЕНЕНО
    environment:
      POSTGRES_DB: ${PROFILE_DB_NAME:-stackover_profile_service}
      POSTGRES_USER: ${PROFILE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD:-root}
    volumes:
      - postgres_profile_data:/var/lib/postgresql/data
    networks:
      - stackover-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROFILE_DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  profile-service:
    container_name: stackover-profile-service
    build:
      context: ./stackoverkata-profile-service
      dockerfile: Dockerfile
    image: profile-server:latest
    ports:
      - "8182:8182"
    environment:
      SPRING_PROFILES_ACTIVE: ${ACTIVE_PROFILE:-docker}
      DB_HOST: postgres-profile
      DB_PORT: 5432
      DB_NAME: ${PROFILE_DB_NAME:-profile_db}
      DB_USER: ${PROFILE_DB_USER:-postgres}
      DB_PASSWORD: ${PROFILE_DB_PASSWORD:-root}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-profile:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8182/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== RESOURCE SERVICE ==========
  postgres-resource:
    container_name: postgres-resource
    image: dockerhub.timeweb.cloud/library/postgres:17-alpine # <--- ИЗМЕНЕНО
    environment:
      POSTGRES_DB: ${RESOURCE_DB_NAME:-resource_db}
      POSTGRES_USER: ${RESOURCE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD:-root}
    volumes:
      - postgres_resource_data:/var/lib/postgresql/data
    networks:
      - stackover-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RESOURCE_DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: rabbitmq
    image: dockerhub.timeweb.cloud/library/rabbitmq:3-management # <--- ИЗМЕНЕНО
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stackover-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  resource-service:
    container_name: stackover-resource-service
    build:
      context: ./stackoverkata-resource-service
      dockerfile: Dockerfile
    image: stackover-resource-service:latest
    ports:
      - "8181:8181"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres-resource
      DB_PORT: 5432
      DB_NAME: ${RESOURCE_DB_NAME:-resource_db}
      DB_USER: ${RESOURCE_DB_USER:-postgres}
      DB_PASSWORD: ${RESOURCE_DB_PASSWORD:-root}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: resource-service
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-resource:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8181/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== EMAIL SERVICE ==========
  email-service:
    container_name: stackover-email-service
    build:
      context: ./stackoverkata-email-service
      dockerfile: Dockerfile
    image: email-server:latest
    ports:
      - "8183:8183"
    environment:
      SPRING_PROFILES_ACTIVE: ${ACTIVE_PROFILE:-docker}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8183/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== GATEWAY SERVICE ==========
  gateway-service:
    container_name: stackover-gateway
    build:
      context: ./stackoverkata-gateway
      dockerfile: Dockerfile
    image: stackover-gateway:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${ACTIVE_PROFILE:-docker}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - stackover-network
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== WEB CLIENT ==========
  web-client:
    container_name: stackover-web-client
    build:
      context: ./stackoverkata-web-client
      dockerfile: Dockerfile
    image: stackover-web-client:latest
    ports:
      - "8085:80"
    environment:
      - REACT_APP_API_URL=http://gateway-service:8080
    networks:
      - stackover-network
    depends_on:
      - gateway-service

# ========== NETWORKS ==========
networks:
  stackover-network:
    external: true
    name: stackover-network

# ========== VOLUMES ==========
volumes:
  postgres_auth_data:
    driver: local
  postgres_profile_data:
    driver: local
  postgres_resource_data:
    driver: local
  rabbitmq_data:
    driver: local
