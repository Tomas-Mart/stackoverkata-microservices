server:
  port: ${GATEWAY_PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "optional:configserver:http://config-service:8888"
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://localhost:8085"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:8085"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://stackover-auth-service
          predicates:
            - Path=/api/auth/**
        - id: profile-service
          uri: lb://stackover-profile-service
          predicates:
            - Path=/api/profiles/**
        - id: resource-service
          uri: lb://stackover-resource-service
          predicates:
            - Path=/api/resources/**
        - id: email-service
          uri: lb://stackover-email-service
          predicates:
            - Path=/api/email/**
        - id: actuator
          uri: http://localhost:${server.port}
          predicates:
            - Path=/actuator/**

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:stackover-gateway}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:

app:
  jwt:
    access-expiration-ms: 86400000
    refresh-expiration-ms: 2592000000
    secret: ${JWT_SECRET:KX9pPmTqYtXuWrZv3w6z5C8F1J4H7N2B5E9R0DcGbQa}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: DEBUG