server:
  port: ${CONFIG_SERVICE_PORT:8888}

spring:
  application:
    name: stackover-config-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/Tomas-Mart/stackoverkata-config-repo.git}
          search-paths: services
          clone-on-start: true
          default-label: ${CONFIG_REPO_BRANCH:main}
          timeout: 10
          force-pull: true
        bootstrap: true
    compatibility-verifier:
      enabled: false

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.int}
    prefer-ip-address: true
    hostname: ${EUREKA_HOSTNAME:localhost}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.cloud.config.server: DEBUG
    org.eclipse.jgit: DEBUG
    com.netflix.discovery: INFO
    com.netflix.eureka: INFO