spring:
  application:
    name: stackover-config-service
  profiles:
    active: kubernetes
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Tomas-Mart/stackoverkata-config-repo.git
          search-paths: services
          clone-on-start: true
          default-label: main
          timeout: 10
    kubernetes:
      discovery:
        enabled: false
      enabled: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://stackoverkata-eureka-server.default.svc.cluster.local:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.config.server: DEBUG
    org.eclipse.jgit: DEBUG