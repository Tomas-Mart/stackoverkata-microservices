server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    appname: eureka-server
    prefer-ip-address: false
  client:
    register-with-eureka: false  # ⚡ ИСПРАВЛЕНО: сервер не регистрируется сам в себе
    fetch-registry: false         # ⚡ ИСПРАВЛЕНО: серверу не нужен реестр от себя
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  server:
    enable-self-preservation: ${EUREKA_SERVER_ENABLE_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: ${EUREKA_SERVER_EVICTION_INTERVAL_TIMER_IN_MS:5000}
    response-cache-update-interval-ms: 30000